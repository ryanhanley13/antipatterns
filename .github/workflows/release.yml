name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish antipatterns.skill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run the test suite
        run: python -m unittest discover -s tests
      - name: Build the bundle
        run: python tools/build_bundle.py
      - name: Publish bundle to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: RELEASE_NOTES/${{ github.ref_name }}.md
        run: |
          if [[ ! -f "$NOTES" ]]; then
            echo "::error::Release notes not found: $NOTES"
            echo "Write RELEASE_NOTES/<tag>.md before tagging, then re-run."
            exit 1
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" antipatterns.skill --clobber
          else
            gh release create "${GITHUB_REF_NAME}" antipatterns.skill \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "$NOTES" \
              --verify-tag
          fi
